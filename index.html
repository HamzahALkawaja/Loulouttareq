    <script>
  document.addEventListener("submit", function(e) {
    e.preventDefault();
    
    // هاد الكود بيلقط الكلمات من الخانات بطريقة ذكية جداً بناءً على نوع الخانة ونوع الكلام
    let nameInput = "";
    let emailInput = "";
    let phoneInput = "";
    let messageInput = document.querySelector('textarea')?.value || "";

    // بنلف على كل خانات الإدخال بالموقع وبنشوف شو المكتوب جواها
    document.querySelectorAll('input').forEach(input => {
      const val = input.value;
      if (val) {
        if (input.type === 'email' || val.includes('@')) {
          emailInput = val;
        } else if (input.type === 'tel' || /^[0-9+-\s]{7,15}$/.test(val)) {
          phoneInput = val;
        } else if (val.trim().length > 0 && !val.includes('@')) {
          nameInput = val;
        }
      }
    });

    const submitButton = e.target.querySelector('button[type="submit"]') || document.querySelector('button');
    if(submitButton) submitButton.innerText = "جاري الإرسال...";

    // شحن البيانات لـ Web3Forms
    fetch("https://api.web3forms.com/submit", {
      method: "POST",
      headers: { "Content-Type": "application/json", "Accept": "application/json" },
      body: JSON.stringify({
        access_key: "df8e4290-a336-4231-a7c4-396f17dc6c5c",
        name: nameInput,
        email: emailInput,
        phone: phoneInput,
        message: messageInput
      })
    })
    .then(response => {
      if(submitButton) submitButton.innerText = "تم الإرسال بنجاح! ✓";
      alert("شكرًا لتواصلك معنا، تم إرسال رسالتك بنجاح.");
    })
    .catch(error => {
      if(submitButton) submitButton.innerText = "إرسال";
      alert("حدث خطأ، يرجى المحاولة مرة أخرى.");
    });
  });
</script>



<div id="more-teachers-btn" style="position: absolute; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; justify-content: center; width: 100%;">
  <a href="./teachers.html" target="_blank" style="background-color: #059669; color: white; padding: 14px 40px; font-weight: bold; font-size: 16px; border-radius: 12px; text-decoration: none; box-shadow: 0 4px 12px rgba(5, 150, 105, 0.4); text-align: center; display: inline-block; white-space: nowrap;">
    More / المزيد من المعلمين
  </a>
</div>

<script>
  // ثبّت زر "المزيد من المعلمين" دائماً فوق قسم "آراء أولياء الأمور"
  (function () {
    function positionMoreTeachersBtn() {
      var btn = document.getElementById('more-teachers-btn');
      var section = document.getElementById('testimonials');
      if (!btn || !section) return;
      // أعلى قسم آراء أولياء الأمور بالنسبة للصفحة كاملة
      var sectionTop = section.getBoundingClientRect().top + window.scrollY + 50;
      var gap = 90; // مسافة فوق العنوان بالبكسل
      btn.style.top = (sectionTop - gap) + 'px';
    }

    function schedule() {
      // أعِد الحساب بعد رسم العناصر لضمان قياس صحيح
      requestAnimationFrame(positionMoreTeachersBtn);
    }

    window.addEventListener('load', schedule);
    window.addEventListener('resize', schedule);
    document.addEventListener('DOMContentLoaded', schedule);
    // إعادة الحساب بشكل دوري لأول ثوانٍ لمعالجة تحميل المحتوى المتأخر (صور/خطوط/React)
    var ticks = 0;
    var iv = setInterval(function () {
      positionMoreTeachersBtn();
      if (++ticks > 20) clearInterval(iv);
    }, 300);
  })();
</script>
